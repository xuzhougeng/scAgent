<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Hub 管理</title>
    <link rel="stylesheet" href="/plugins.css" />
  </head>
  <body>
    <div class="hub-shell">
      <aside class="hub-sidebar">
        <div class="hub-brand">
          <p class="eyebrow">插件管理</p>
          <h1>Skill Hub</h1>
          <p class="muted">统一管理内置技能和外部插件包，包括上传、刷新、关闭和重新启用。</p>
          <div class="hub-brand-links">
            <a class="ghost-link" href="/">返回分析台</a>
            <a class="ghost-link" href="/help.html" target="_blank" rel="noreferrer">打开帮助</a>
          </div>
        </div>

        <details class="sidebar-card sidebar-fold">
          <summary class="sidebar-fold-summary">
            <div>
              <strong>概览</strong>
              <p>只保留技能包和已加载技能的摘要。</p>
            </div>
            <span id="summaryBadge" class="summary-badge">加载中</span>
          </summary>
          <div class="sidebar-fold-body">
            <div id="hubSummary" class="summary-grid"></div>
          </div>
        </details>

        <details class="sidebar-card sidebar-fold">
          <summary class="sidebar-fold-summary">
            <div>
              <strong>管理动作</strong>
              <p>上传 zip 插件包，或刷新当前 Skill Hub 状态。</p>
            </div>
            <span class="summary-badge">操作</span>
          </summary>
          <div class="sidebar-fold-body">
            <form id="pluginUploadForm" class="upload-form">
              <label for="pluginFileInput">上传 zip 插件包</label>
              <input id="pluginFileInput" name="file" type="file" accept=".zip,application/zip" />
              <button type="submit">安装插件</button>
            </form>
            <div class="hub-actions">
              <button id="refreshButton" type="button" class="ghost-button">刷新列表</button>
            </div>
            <div id="hubStatus" class="status-text muted"></div>
          </div>
        </details>
      </aside>

      <main class="hub-main">
        <header class="hub-header">
          <div>
            <p class="eyebrow">Skill Hub</p>
            <h2>插件与技能包</h2>
            <p class="muted">技能统一放在右侧技能包区域。展开某个技能包后即可查看全部技能，点击任一技能可在右侧检查器里查看说明、输入输出规范和实现方式。</p>
          </div>
        </header>
        <div class="hub-workspace">
          <section class="bundle-column">
            <div class="section-head">
              <h3>插件与技能包</h3>
              <p class="muted">支持启停内置技能包和外部插件包。展开卡片可查看该 bundle 里的全部技能。</p>
            </div>
            <section id="bundleList" class="bundle-grid"></section>
          </section>

          <aside class="inspector-column">
            <div class="inspector-card">
              <div class="section-head">
                <h3>技能详情</h3>
                <p class="muted">点击某个技能后，在这里查看字段规范、目标对象和实现配置。</p>
              </div>
              <div id="skillDetail" class="skill-detail"></div>
            </div>
          </aside>
        </div>
      </main>
    </div>

    <script src="/plugins.js" defer></script>
  </body>
</html>
