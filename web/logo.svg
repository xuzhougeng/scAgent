<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7d58"/>
      <stop offset="100%" stop-color="#2a5037"/>
    </linearGradient>
  </defs>

  <!-- Icon (same as favicon, scaled to 64x64 at offset 8,8) -->
