<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scAgent 分析台</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="panel explorer">
        <div class="panel-head">
          <p class="eyebrow">分析导航</p>
          <h1>工作区与会话</h1>
        </div>
        <div id="workspaceNavigator" class="workspace-navigator"></div>
        <div id="sessionMeta" class="session-meta"></div>
        <div id="skillHubEntry" class="skill-hub"></div>
        <div id="statusOverviewEntry" class="status-overview-slot"></div>
      </aside>

      <div
        id="leftSidebarHandle"
        class="sidebar-resize-handle"
        role="separator"
        aria-orientation="vertical"
        aria-label="调整左侧信息栏宽度"
        tabindex="0"
      ></div>

      <main class="panel console">
        <div class="panel-head">
          <p class="eyebrow">对话与指令</p>
          <div>
            <h2>分析控制台</h2>
            <div class="panel-head-links">
              <a class="inline-link" href="/plugins.html">插件管理</a>
              <a class="inline-link" href="/help.html" target="_blank" rel="noreferrer">打开帮助</a>
            </div>
          </div>
        </div>
        <div id="consoleInfoBar" class="console-info-bar"></div>
        <form id="uploadForm" class="upload-bar">
          <label class="upload-file-trigger" for="fileInput">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            选择并上传 h5ad 文件
          </label>
          <input id="fileInput" name="file" type="file" accept=".h5ad,.ha5d" />
          <span id="fileName" class="upload-file-name">选择文件后将自动上传</span>
        </form>
        <div id="uploadStatus" class="upload-status muted"></div>
        <div id="quickActions" class="quick-actions"></div>
        <div id="chat" class="chat"></div>
        <div id="composerModeBar" class="composer-mode hidden" aria-live="polite"></div>
        <form id="composer" class="composer">
          <textarea
            id="messageInput"
            rows="3"
            placeholder="例如：把 T 细胞拿出来重新聚类，然后画一下 marker"
          ></textarea>
          <button id="composerSubmitButton" type="submit">运行</button>
        </form>
        <div class="planner-tools">
          <button id="plannerPreviewButton" type="button" class="ghost-button">预览规划上下文</button>
          <button id="workspaceFilesButton" type="button" class="ghost-button">查看 Workspace 文件</button>
          <div id="plannerPreviewStatus" class="muted"></div>
        </div>
      </main>

      <div
        id="rightSidebarHandle"
        class="sidebar-resize-handle"
        role="separator"
        aria-orientation="vertical"
        aria-label="调整右侧信息栏宽度"
        tabindex="0"
      >
        <button
          id="rightSidebarToggle"
          type="button"
          class="sidebar-collapse-button"
          aria-label="收起右侧信息栏"
          aria-controls="rightInspectorPanel"
          aria-expanded="true"
        >></button>
      </div>

      <aside id="rightInspectorPanel" class="panel inspector">
        <div class="panel-head">
          <p class="eyebrow">检查器 / 上下文</p>
          <h2>当前上下文</h2>
        </div>
        <div id="inspector" class="inspector-body"></div>
      </aside>
    </div>

    <template id="messageTemplate">
      <article class="message">
        <div class="message-role"></div>
        <pre class="message-content"></pre>
      </article>
    </template>

    <div id="imageModal" class="image-modal hidden" aria-hidden="true">
      <div id="imageModalBackdrop" class="image-modal-backdrop"></div>
      <div class="image-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="imageModalTitle">
        <div class="image-modal-head">
          <h3 id="imageModalTitle">结果预览</h3>
          <div class="image-modal-actions">
            <a id="imageModalOpen" class="inline-link" target="_blank" rel="noreferrer">打开</a>
            <a id="imageModalDownload" class="inline-link" download>下载</a>
            <button id="imageModalClose" type="button" class="ghost-button">关闭</button>
          </div>
        </div>
        <div class="image-modal-body">
          <img id="imageModalImage" alt="" />
        </div>
      </div>
    </div>

    <div id="statusOverviewModal" class="status-modal hidden" aria-hidden="true">
      <div id="statusOverviewModalBackdrop" class="status-modal-backdrop"></div>
      <div class="status-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="statusOverviewModalTitle">
        <div class="status-modal-head">
          <div>
            <p class="eyebrow">运行概览</p>
            <h3 id="statusOverviewModalTitle">系统状态、技能与环境</h3>
          </div>
          <button id="statusOverviewModalClose" type="button" class="ghost-button">关闭</button>
        </div>
        <div id="statusOverviewModalContent" class="status-modal-body"></div>
      </div>
    </div>

    <div id="workspaceFilesModal" class="workspace-files-modal hidden" aria-hidden="true">
      <div id="workspaceFilesModalBackdrop" class="workspace-files-modal-backdrop"></div>
      <div class="workspace-files-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="workspaceFilesModalTitle">
        <div class="workspace-files-modal-head">
          <div>
            <p class="eyebrow">Workspace 文件</p>
            <h3 id="workspaceFilesModalTitle">当前 Workspace 输出文件</h3>
          </div>
          <button id="workspaceFilesModalClose" type="button" class="ghost-button">关闭</button>
        </div>
        <div id="workspaceFilesModalContent" class="workspace-files-modal-body"></div>
      </div>
    </div>

    <div id="plannerPreviewModal" class="planner-preview-modal hidden" aria-hidden="true">
      <div id="plannerPreviewModalBackdrop" class="planner-preview-modal-backdrop"></div>
      <div class="planner-preview-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="plannerPreviewModalTitle">
        <div class="planner-preview-modal-head">
          <div>
            <p class="eyebrow">规划预览</p>
            <h3 id="plannerPreviewModalTitle">当前规划上下文</h3>
          </div>
          <div class="planner-preview-modal-actions">
            <span id="plannerPreviewCopyStatus" class="muted"></span>
            <button id="plannerPreviewCopyButton" type="button" class="ghost-button">复制规划上下文</button>
            <button id="plannerPreviewModalClose" type="button" class="ghost-button">关闭</button>
          </div>
        </div>
        <div id="plannerPreviewModalContent" class="planner-preview planner-preview-modal-body"></div>
      </div>
    </div>

    <div id="confirmModal" class="confirm-modal hidden" aria-hidden="true">
      <div id="confirmModalBackdrop" class="confirm-modal-backdrop"></div>
      <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
        <div class="confirm-modal-head">
          <div>
            <p id="confirmModalEyebrow" class="eyebrow">确认操作</p>
            <h3 id="confirmModalTitle">确认执行这个操作？</h3>
          </div>
        </div>
        <div class="confirm-modal-body">
          <p id="confirmModalMessage" class="confirm-modal-message"></p>
        </div>
        <div class="confirm-modal-actions">
          <button id="confirmModalCancel" type="button" class="ghost-button">取消</button>
          <button id="confirmModalConfirm" type="button" class="confirm-modal-confirm">确认</button>
        </div>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
  </html>
