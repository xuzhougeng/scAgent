<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scAgent Control Plane</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="panel explorer">
        <div class="panel-head">
          <p class="eyebrow">Object Explorer</p>
          <h1>Session Objects</h1>
        </div>
        <div id="sessionMeta" class="session-meta"></div>
        <div id="objectTree" class="object-tree"></div>
      </aside>

      <main class="panel console">
        <div class="panel-head">
          <p class="eyebrow">Chat + Command</p>
          <div>
            <h2>Control Plane</h2>
            <a class="inline-link" href="/help.html" target="_blank" rel="noreferrer">Open Help</a>
          </div>
        </div>
        <form id="uploadForm" class="upload-bar">
          <label class="upload-label" for="fileInput">Upload h5ad</label>
          <input id="fileInput" name="file" type="file" accept=".h5ad,.ha5d" />
          <button type="submit" class="ghost-button">Attach Dataset</button>
        </form>
        <div id="uploadStatus" class="upload-status muted"></div>
        <div id="quickActions" class="quick-actions"></div>
        <div id="chat" class="chat"></div>
        <form id="composer" class="composer">
          <textarea
            id="messageInput"
            rows="3"
            placeholder="例如：把 cortex 细胞拿出来重新聚类，然后画一下 marker"
          ></textarea>
          <button type="submit">Run</button>
        </form>
        <div class="planner-tools">
          <button id="plannerPreviewButton" type="button" class="ghost-button">Preview Planner Context</button>
          <div id="plannerPreviewStatus" class="muted"></div>
        </div>
      </main>

      <aside class="panel inspector">
        <div class="panel-head">
          <p class="eyebrow">Inspector / Context</p>
          <h2>Active Context</h2>
        </div>
        <div id="systemStatus" class="system-status"></div>
        <div id="inspector" class="inspector-body"></div>
        <div id="plannerPreview" class="planner-preview"></div>
      </aside>
    </div>

    <template id="messageTemplate">
      <article class="message">
        <div class="message-role"></div>
        <pre class="message-content"></pre>
      </article>
    </template>

    <div id="imageModal" class="image-modal hidden" aria-hidden="true">
      <div id="imageModalBackdrop" class="image-modal-backdrop"></div>
      <div class="image-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="imageModalTitle">
        <div class="image-modal-head">
          <h3 id="imageModalTitle">Artifact Preview</h3>
          <div class="image-modal-actions">
            <a id="imageModalOpen" class="inline-link" target="_blank" rel="noreferrer">Open</a>
            <a id="imageModalDownload" class="inline-link" download>Download</a>
            <button id="imageModalClose" type="button" class="ghost-button">Close</button>
          </div>
        </div>
        <div class="image-modal-body">
          <img id="imageModalImage" alt="" />
        </div>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
  </html>
